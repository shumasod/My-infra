name: Notification Health Check

# 通知システムの疎通確認
# 月1回 + 手動実行で、通知チャネルが正常に機能しているか検証する。
# 直近7日間のセキュリティテスト失敗が見逃されていないかも確認する。

on:
  schedule:
    # 毎月1日 午前9時（JST 18時）に実行
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      test_slack:
        description: 'Slackにテスト通知を送信する'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  check-recent-failures:
    name: 直近の失敗確認
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      has_recent_failure: ${{ steps.scan.outputs.has_recent_failure }}
      failure_summary: ${{ steps.scan.outputs.failure_summary }}

    steps:
      - name: 直近7日間のセキュリティテスト結果をスキャン
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 直近7日間のワークフロー実行結果を確認中..."

          # 直近7日間の Security Tests ワークフローを取得
          FAILURES=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "Security Tests" \
            --status failure \
            --created ">==$(date -d '7 days ago' '+%Y-%m-%d')" \
            --json databaseId,conclusion,createdAt,headBranch \
            --jq 'length' 2>/dev/null || echo "0")

          if [ "$FAILURES" -gt 0 ]; then
            echo "has_recent_failure=true" >> $GITHUB_OUTPUT
            SUMMARY=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "Security Tests" \
              --status failure \
              --created ">==$(date -d '7 days ago' '+%Y-%m-%d')" \
              --json databaseId,createdAt,headBranch \
              --jq '.[] | "- \(.createdAt[:10]) branch:\(.headBranch) id:\(.databaseId)"' \
              2>/dev/null | head -5 || echo "取得失敗")
            echo "failure_summary<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "⚠️ 直近7日間に ${FAILURES} 件の失敗が検出されました"
          else
            echo "has_recent_failure=false" >> $GITHUB_OUTPUT
            echo "failure_summary=なし" >> $GITHUB_OUTPUT
            echo "✅ 直近7日間の失敗なし"
          fi

  verify-issue-notification:
    name: Issue通知チャネルの疎通確認
    runs-on: ubuntu-latest
    needs: check-recent-failures
    continue-on-error: true
    permissions:
      contents: read
      issues: write

    steps:
      - name: security-alert ラベルの存在確認
        id: label_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh label list --repo "${{ github.repository }}" --json name --jq '.[].name' | grep -q "^security-alert$"; then
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "✅ security-alert ラベルが存在します"
          else
            echo "status=missing" >> $GITHUB_OUTPUT
            echo "⚠️ security-alert ラベルが存在しません。作成します..."
            gh label create "security-alert" \
              --repo "${{ github.repository }}" \
              --color "d93f0b" \
              --description "セキュリティテスト失敗の自動通知" && \
              echo "✅ ラベルを作成しました"
          fi

      - name: 未解決の通知Issueを確認
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_COUNT=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "security-alert" \
            --state open \
            --json number \
            --jq 'length' 2>/dev/null || echo "0")

          if [ "$OPEN_COUNT" -gt 0 ]; then
            echo "⚠️ 未解決の security-alert Issue が ${OPEN_COUNT} 件あります"
            gh issue list \
              --repo "${{ github.repository }}" \
              --label "security-alert" \
              --state open \
              --json number,title,createdAt \
              --jq '.[] | "#\(.number) \(.title) (作成: \(.createdAt[:10]))"' || true
          else
            echo "✅ 未解決の security-alert Issue はありません"
          fi

      - name: 見逃し失敗の再通知（直近失敗あり・未解決Issueなし）
        if: |
          needs.check-recent-failures.outputs.has_recent_failure == 'true' &&
          steps.label_check.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_COUNT=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "security-alert" \
            --state open \
            --json number \
            --jq 'length' 2>/dev/null || echo "0")

          # 未解決Issueがないのに失敗が存在する = 通知が届いていない可能性
          if [ "$OPEN_COUNT" -eq 0 ]; then
            echo "🚨 通知が届いていない可能性があります。Issue を作成します..."
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "🚨 [通知漏れ検知] セキュリティテスト失敗 ($(date '+%Y-%m-%d'))" \
              --label "security-alert" \
              --body "## 通知漏れが検知されました

月次ヘルスチェックにより、直近7日間のセキュリティテスト失敗が
通知されていなかった可能性があります。

**直近の失敗:**
${{ needs.check-recent-failures.outputs.failure_summary }}

| 項目 | 値 |
|------|-----|
| 検知日時 | $(date '+%Y-%m-%d %H:%M UTC') |
| ヘルスチェックURL | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

> [notification-health-check] ワークフローにより自動作成されました。"
          fi

  verify-slack-notification:
    name: Slack通知チャネルの疎通確認
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Slack接続テスト
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SEND_TEST="${{ github.event.inputs.test_slack }}"
          if [ "${SEND_TEST}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "📡 Slack疎通確認メッセージを送信中..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \"✅ *通知ヘルスチェック* - $(date '+%Y-%m-%d')\",
                \"attachments\": [{
                  \"color\": \"good\",
                  \"text\": \"My-infra セキュリティ通知チャネルは正常に動作しています。\"
                }]
              }")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Slack疎通確認 OK (HTTP ${HTTP_STATUS})"
            else
              echo "❌ Slack疎通確認 NG (HTTP ${HTTP_STATUS})"
              exit 1
            fi
          else
            echo "ℹ️ テスト通知はスキップされました（test_slack=false）"
          fi

      - name: Slack未設定の案内
        if: env.SLACK_WEBHOOK_URL == ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "ℹ️ SLACK_WEBHOOK_URL シークレットが未設定のため Slack 疎通確認をスキップします"
          echo "   有効化: Repository Settings > Secrets and variables > Actions > SLACK_WEBHOOK_URL"

  health-check-summary:
    name: ヘルスチェックサマリー
    runs-on: ubuntu-latest
    needs: [check-recent-failures, verify-issue-notification, verify-slack-notification]
    if: always()
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: サマリー出力
        run: |
          echo "# 🔔 通知ヘルスチェック結果 ($(date '+%Y-%m-%d'))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| チャネル | 状態 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 直近失敗スキャン | ${{ needs.check-recent-failures.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Issue通知 | ${{ needs.verify-issue-notification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slack通知        | ${{ needs.verify-slack-notification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.check-recent-failures.outputs.has_recent_failure }}" = "true" ]; then
            echo "## ⚠️ 直近7日間に失敗が検出されました" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.check-recent-failures.outputs.failure_summary }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ 直近7日間の失敗なし・通知チャネル正常" >> $GITHUB_STEP_SUMMARY
          fi
