name: Security Tests

on:
  push:
    branches: [ main, master, claude/** ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 毎日午前3時（JST 12時）にセキュリティスキャン実行
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ===== 認証情報・インジェクションスキャン（BATSテスト統合） =====
  bats-security-tests:
    name: セキュリティテスト（BATS）
    runs-on: ubuntu-latest
    continue-on-error: true  # 失敗時にメール通知を送らない
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 依存関係のインストール
        run: sudo apt-get update -qq && sudo apt-get install -y bats shellcheck

      - name: BATSセキュリティテストの実行
        run: |
          for test_file in \
            tests/security/test_credential_exposure.bats \
            tests/security/test_command_injection.bats; do
            if [ -f "$test_file" ]; then
              bats "$test_file"
            else
              echo "警告: $test_file が見つかりません"
            fi
          done

      - name: gitleaksによる認証情報スキャン
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo mv gitleaks /usr/local/bin/

          if ! gitleaks detect --source . --report-format json --report-path gitleaks-report.json; then
            echo "⚠️ 認証情報の漏洩が検出されました！"
            cat gitleaks-report.json
          else
            echo "✅ 認証情報の漏洩は検出されませんでした"
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

  # ===== シェルスクリプト静的解析 =====
  shellcheck:
    name: シェルスクリプト静的解析
    runs-on: ubuntu-latest
    continue-on-error: true  # 失敗時にメール通知を送らない
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: shellcheckのインストール
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: 重要なスクリプトのshellcheck実行
        run: |
          echo "🔍 重要なスクリプトをチェック中..."
          CRITICAL_DIRS=("DB" "deploy" "server" "security" "AWS" "lib" "Validation")
          for dir in "${CRITICAL_DIRS[@]}"; do
            [ -d "$dir" ] || continue
            echo "📂 $dir をチェック中..."
            find "$dir" -name "*.sh" -type f -print0 | \
              xargs -0 shellcheck --severity=warning --shell=bash --format=gcc 2>&1 | \
              tee "shellcheck-${dir}.log" && echo "✅ $dir: 問題なし" || echo "❌ $dir: 問題が検出されました"
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: shellcheck-reports
          path: shellcheck-*.log
          if-no-files-found: ignore

  # ===== Python入力検証テスト =====
  python-security-tests:
    name: Python入力検証テスト
    runs-on: ubuntu-latest
    continue-on-error: true  # 失敗時にメール通知を送らない
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: 依存関係のインストール
        run: |
          pip install --upgrade pip --quiet
          [ -f requirements.txt ] && pip install -r requirements.txt --quiet || true
          pip install pytest bandit --quiet

      - name: 入力検証テストの実行
        run: |
          if [ -f tests/security/test_input_validation.py ]; then
            python -m pytest tests/security/test_input_validation.py -v --tb=short
          else
            echo "警告: 入力検証テストが見つかりません"
          fi

      - name: Banditセキュリティスキャン
        run: |
          echo "🔒 Pythonコードのセキュリティスキャン中..."
          bandit -r . -f json -o bandit-report.json \
            --exclude ./tests,./venv,./env -ll 2>/dev/null || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: python-security-reports
          path: bandit-report.json
          if-no-files-found: ignore

  # ===== 依存関係の脆弱性スキャン =====
  dependency-scan:
    name: 依存関係脆弱性スキャン
    runs-on: ubuntu-latest
    continue-on-error: true  # 失敗時にメール通知を送らない
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Trivyスキャン
        run: |
          TRIVY_VERSION="0.59.1"
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          sudo mv trivy /usr/local/bin/
          trivy fs --severity HIGH,CRITICAL --format table . || true
          [ -f dockerfile ] && trivy config --severity HIGH,CRITICAL --format table dockerfile || true

  # ===== OWASP Dependency Check（スケジュール・手動のみ） =====
  owasp-dependency-check:
    name: OWASP依存関係チェック
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true  # 失敗時にメール通知を送らない
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: dependency-check/Dependency-Check_Action@4aab7087ab4f6ecbb6c3b8ad9e0ff8edde05c88a  # v1.1.0
        with:
          project: 'My-infra'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: dependency-check-report
          path: reports

  # ===== セキュリティサマリー =====
  security-summary:
    name: セキュリティテストサマリー
    runs-on: ubuntu-latest
    needs: [bats-security-tests, shellcheck, python-security-tests, dependency-scan]
    if: always()
    continue-on-error: true  # 失敗時にメール通知を送らない
    permissions:
      contents: read

    steps:
      - name: サマリー生成
        run: |
          echo "# 🔒 セキュリティテスト結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| テスト | 結果 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| BATSセキュリティテスト | ${{ needs.bats-security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| シェルスクリプト静的解析 | ${{ needs.shellcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python入力検証 | ${{ needs.python-security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 依存関係スキャン | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.bats-security-tests.result }}" != "success" ] || \
             [ "${{ needs.shellcheck.result }}" != "success" ] || \
             [ "${{ needs.python-security-tests.result }}" != "success" ]; then
            echo "## ⚠️ セキュリティ問題が検出されました" >> $GITHUB_STEP_SUMMARY
            echo "詳細は各ジョブのログを確認してください。" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ すべての必須セキュリティテストが成功しました" >> $GITHUB_STEP_SUMMARY
          fi

  # ===== 失敗時の通知（メール通知無効時のフォールバック） =====
  notify-on-failure:
    name: 失敗通知（GitHub Issue）
    runs-on: ubuntu-latest
    needs: [bats-security-tests, shellcheck, python-security-tests]
    if: |
      always() && (
        needs.bats-security-tests.result == 'failure' ||
        needs.shellcheck.result == 'failure' ||
        needs.python-security-tests.result == 'failure'
      )
    permissions:
      contents: read
      issues: write

    steps:
      - name: 失敗ジョブの特定
        id: check
        run: |
          FAILED=""
          [ "${{ needs.bats-security-tests.result }}" = "failure" ] && FAILED="${FAILED} BATSセキュリティテスト"
          [ "${{ needs.shellcheck.result }}" = "failure" ]          && FAILED="${FAILED} シェルスクリプト静的解析"
          [ "${{ needs.python-security-tests.result }}" = "failure" ] && FAILED="${FAILED} Python入力検証テスト"
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT

      - name: security-alert ラベルの確認・作成
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "security-alert" \
            --repo "${{ github.repository }}" \
            --color "d93f0b" \
            --description "セキュリティテスト失敗の自動通知" 2>/dev/null || true

      - name: 既存Issueへのコメントまたは新規作成
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATE=$(date '+%Y-%m-%d')

          # 同日の未解決Issueが既にあればコメントを追加
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "security-alert" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "### 🔄 再発検知: ${DATE}
**失敗ジョブ:**${{ steps.check.outputs.failed }}
**実行URL:** ${RUN_URL}
**ブランチ:** \`${{ github.ref_name }}\` / コミット: \`${GITHUB_SHA:0:7}\`"
            echo "既存Issue #${EXISTING} にコメントを追加しました"
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "🚨 セキュリティテスト失敗 (${DATE})" \
              --label "security-alert" \
              --body "## セキュリティテストが失敗しました

**失敗ジョブ:**${{ steps.check.outputs.failed }}

| 項目 | 値 |
|------|-----|
| 実行URL | [ログを確認](${RUN_URL}) |
| ブランチ | \`${{ github.ref_name }}\` |
| コミット | \`${GITHUB_SHA:0:7}\` |
| 検知日時 | $(date '+%Y-%m-%d %H:%M UTC') |

> このIssueはCIパイプラインにより自動作成されました。
> 問題を解決後、このIssueをクローズしてください。"
            echo "新しいIssueを作成しました"
          fi
